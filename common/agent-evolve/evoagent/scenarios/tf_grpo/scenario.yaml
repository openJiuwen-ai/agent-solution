schema_version: "1.0"
optimizer_class: optimizer.TfGrpoOptimizer
adapter_url: "http://127.0.0.1:18900"
skills:
  - name: audit-business
    optimize: true
rollout:
  max_turns: 15
  extra_data: {}
hyperparams:
  # TF-GRPO
  group_size: 3
  cases_per_variant: 8
  variant_temperature: 1.5
  max_experiences: 20
  # Trainer / rollout
  num_epochs: 3
  batch_size: 4
  num_parallel: 4
  steps_per_epoch: 1
  accumulation: 1
  use_slow_update: false
  use_meta_skill: false
