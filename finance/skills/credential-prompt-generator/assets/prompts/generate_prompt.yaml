# 提示词模板配置文件
# 使用 {{ placeholder }} 作为占位符

# 生成初始提示词
generate_prompt: |
  你是一个专业的提示词工程师。请根据提供的凭证图片样例，生成一个用于适用于该凭证类型的提取关键信息的通用提示词。

  要求：
  1. 分析图片内容，确定凭证类型（如信用证申请书、电汇凭证、合同等）
  2. 根据凭证类型，定义合适的专家角色
  3. 列出该类型凭证需要提取的关键字段
  4. 为每个字段提供提取指南
  5. **防止过拟合**，为了提示词的通用性(用于提取同类型的另外凭证)：禁止提示词中出现图片样例中的实际值

  请直接输出提示词，**不需要其他说明**。提示词应该包含：
  - 角色设定
  - 任务说明
  - 提取指南：为每个字段提供定位和提取方法
  - 输出JSON格式：展示期望的输出结构

  JSON格式字段命名规范(**以下要求不要出现在输出的提示词中**，只是您生成提示词的要求)：
  - 使用英文 snake_case 格式（如 document_type, account_name）
  - 相关字段使用嵌套对象分组

  {{ field_names_hint }}
