# Optional profile: switch checkpointer from in_memory (default) to Redis.
#
# Usage on server (fat jar):
#   REDIS_HOST=<host> REDIS_PORT=<port> REDIS_PASSWORD=<plaintext-or-blank> \
#     java -jar agent-deep-research-runtime-*.jar \
#       --spring.profiles.active=redis-checkpointer
#
# Notes:
# - Default CredentialDecryptor is passthrough, so REDIS_PASSWORD can be plaintext for testing.
# - Delete this profile once redis is no longer needed; base application.yml keeps in_memory as default.
openjiuwen:
  service:
    middleware:
      checkpointer:
        type: redis
        redis-ref: default
      redis:
        default:
          host: ${REDIS_HOST:127.0.0.1}
          port: ${REDIS_PORT:6379}
          database: ${REDIS_DB:0}
          timeout-ms: ${REDIS_TIMEOUT_MS:3000}
          encrypted-password: ${REDIS_PASSWORD:}
