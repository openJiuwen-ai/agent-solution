poll_interval: 5
start_from: head
skills_root: /data/skills
log_dir: /data/logs
host: 0.0.0.0
port: 8900

agents:
  - name: edp_agent
    log_dir: /data/logs/edp_agent
    log_pattern: process_*.log
    skills_dir: /data/skills/edp_agent
    agent_url: http://edpagent:8090
    project_id: default
    agent_id: edp_agent
    timeout: 300
    skill_backend: jiuwenbox
    jiuwenbox_url: http://jiuwenbox:8321
    sandbox_id_resolve: list_ready
    remote_skills_dir: /tmp/skills
