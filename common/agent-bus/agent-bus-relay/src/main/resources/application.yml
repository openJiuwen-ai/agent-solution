# agent-bus relay Spring Boot 主配置。
#
# 作用:显式声明 datasource + Flyway + agent-bus 默认值,确保 Spring Boot 4 启动时:
#   1. Flyway autoconfig 确定触发,自动执行 db/migration/V1+V3 建表(本仓不含 V2/registry);
#   2. BrokerClientProperties(nameserver/namespace)与 DefaultMQProducer(producer-group)
#      拿到非空值,不再 fail-fast("nameserverEndpoints is required")。
#
# 所有值均支持环境变量覆盖(语法 ${VAR:default}),便于 docker / k8s 部署时注入不同配置;
# 本地 E2E(配合 common/agent-bus/e2e/docker-compose.yml:Postgres 5432 + RocketMQ 9876)
# 可直接用默认值,即 `java -jar agent-bus-relay-*.jar --spring.profiles.active=eventbus` 即可启动。

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agentbus}
    username: ${SPRING_DATASOURCE_USERNAME:agentbus}
    password: ${SPRING_DATASOURCE_PASSWORD:agentbus}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate=true:对已有数据库兼容(若 flyway_schema_history 不存在,
    # 先建 baseline 版本 0,再执行 V1+V3)。若已手动建表但无 flyway_schema_history,
    # 需先 DROP 表让 Flyway 全新执行,或手动插入 flyway_schema_history 记录
    # (见 E2E 指导书 1.4 Fallback)。
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history

  jackson:
    default-property-inclusion: non_null

# agent-bus 连接 + 角色配置(BrokerClientProperties / DefaultMQProducer / relay consumer subscribe 用)。
# nameserver / namespace / producer-group 在构造时强制非空 —— 必须提供(默认值或环境变量),否则启动 fail-fast。
# 生产部署用环境变量覆盖:AGENT_BUS_NAMESERVER / AGENT_BUS_NAMESPACE / AGENT_BUS_PRODUCER_GROUP / ...。
# 注意:gateway(TempClientMain)须用不同的 producer-group(如 gateway-producer)避免与 relay 竞争同组;
# 见 E2E 指导书 §2.4.4(TempClientMain 命令显式带 --agent-bus.producer-group=gateway-producer)。
agent-bus:
  nameserver: ${AGENT_BUS_NAMESERVER:localhost:9876}
  namespace: ${AGENT_BUS_NAMESPACE:ascend-prod}
  producer-group: ${AGENT_BUS_PRODUCER_GROUP:eventbus-producer}
  tenant: ${AGENT_BUS_TENANT:tenant-a}
  gateway-service-id: ${AGENT_BUS_GATEWAY_SERVICE_ID:gateway-01}
  event-bus-service-id: ${AGENT_BUS_EVENT_BUS_SERVICE_ID:eventbus-01}
