# RocketMQ broker config for event-bus (agent-bus) E2E 联调.
# 必须以 -c 加载,否则 enablePropertyFilter=true 不生效(DeliveryFilter 失效).
brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
# nameserver 也通过 docker-compose 的 NAMESRV_ADDR 注入;此处显式声明,双保险.
namesrvAddr=rocketmq-nameserver:9876
# 关键:开启 SQL92 属性过滤,BrokerForwardingConsumer 的 DeliveryFilter(tenantId/targetServiceId)才生效.
enablePropertyFilter=true
deleteWhen=04
fileReservedTime=48
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH
# dev:首次 produce/consume 时自动建 topic(rocketmq-init 也会显式建 8 个,双保险).
autoCreateTopicEnable=true
brokerIP1=127.0.0.1