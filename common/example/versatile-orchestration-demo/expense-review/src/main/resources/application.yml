server:
  port: ${EXPENSE_REVIEW_PORT:18096}

spring:
  application:
    # Drives the A2A card "name" field.
    name: expense-review

openjiuwen:
  service:
    agent-id: expense-review
    query:
      legacy-path-enabled: true
      webflux:
        enabled: false
    a2a:
      agent-description: "费用报销审核 Workflow Agent — 分析报销→查政策→合规比对→审批"
      streaming: true
      default-input-modes: ["text"]
      default-output-modes: ["text"]
      skills:
        - id: review_expense
          name: review_expense
          description: "审核报销申请：分析条目、查询政策、比对合规性、人工审批/自动通过"
          tags: []

expense-review:
  model-provider: ${LLM_PROVIDER:openai}
  api-key: ${LLM_API_KEY:}
  api-base: ${LLM_API_BASE:http://localhost:4000/v1}
  model-name: ${LLM_MODEL:gpt-4o-mini}
  ssl-verify: ${LLM_SSL_VERIFY:true}
